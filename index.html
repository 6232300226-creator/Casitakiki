<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La casita de Kiki</title>
    <link rel="stylesheet" href="CSS_casitakiki.css">
</head>

<body>

<header>
    <div class="logo-container">
        <img src="img/logo_fondoblanco.png" class="mi-logo" alt="La Casita de Kiki">
    </div>
   
    
   <button id="btn-login-google"> Iniciar con Google</button>
</header>

<div id="cart-icon" onclick="toggleCart()">
    🛒 <span id="cart-count">0</span>
</div>

<aside id="shopping-cart" class="cart-hidden">
    <div class="cart-header" style="display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #fffafc; border-bottom: 2px solid #fff0f5;">
        <h3 style="margin: 0; color: #ff6b9d;">Tu Pedido ✨</h3>
        <button onclick="toggleCart()" class="close-btn">×</button>
    </div>

    <div id="cart-items">
        <p class="empty-msg" style="text-align: center; color: #a0848d;">Tu carrito está vacío 🌸</p>
    </div>

    <div class="cart-footer">
        <div class="total-container" style="display: flex; justify-content: space-between; color: #854d5f; font-size: 1.2rem; font-weight: bold; margin-bottom: 15px;">
            <span>Total:</span>
            <span>$<span id="cart-total">0.00</span></span>
        </div>

        <button class="btn-checkout" id="finalizar-compra" onclick="irAPagar()">
            Finalizar Compra 💳
        </button>

        <div id="paypal-button-container" style="display:none; margin-top:15px;"></div>
    </div>
</aside>

<section id="hero-banner">
    <div class="banner-content">
        <h2>¡Bienvenidos a la casita de Kiki! ✨</h2>
        <p>Maquillaje que brilla, pasteles que enamoran y juguetes de novedad.</p>
        <a href="#productos" class="btn-explorar">Ver Novedades 🎀</a>
    </div>
</section>

<section id="filtros">
  <div class="filtros-container">
    <input type="text" id="buscador" placeholder="Buscar producto... 🔍" oninput="aplicarFiltros()" />
    <div class="chips-categorias">
      <button class="chip-cat active" onclick="filtrarCategoria(0, this)">Todos</button>
      <button class="chip-cat" onclick="filtrarCategoria(1, this)">💄 Maquillaje</button>
      <button class="chip-cat" onclick="filtrarCategoria(2, this)">🎂 Pastelería</button>
      <button class="chip-cat" onclick="filtrarCategoria(3, this)">🧸 Juguetes</button>
    </div>
    <div class="filtro-precio">
      <label>Precio máx: <strong id="precio-label">$500</strong></label>
      <input type="range" id="precio-range" min="0" max="500" value="500" step="10" oninput="actualizarPrecio(this.value)" />
    </div>
    <select id="ordenar" onchange="aplicarFiltros()">
      <option value="default">Ordenar por</option>
      <option value="precio-asc">Precio: menor a mayor</option>
      <option value="precio-desc">Precio: mayor a menor</option>
      <option value="nombre">Nombre A-Z</option>
    </select>
  </div>
</section>
    
<main id="productos">
    <div class="grid-productos"></div>
</main>

<footer>
    <div class="footer-contact-item">
    <a href="https://wa.me/5546541735" class="whatsapp-link" target="_blank" rel="noopener noreferrer">
        <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.658 1.43 5.63 1.43h.006c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
            </svg>
        </span>
        <div class="text-container">
            <span class="label">Contáctanos por WhatsApp</span>
            <span class="phone-number">+1 234 567 890</span>
        </div>
    </a>
</div>
    
    <p>© 2025 La Casita de Kiki 🌸</p>

</footer>

<script src="script.js"></script>

</body>
</html>
