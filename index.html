<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La casita de Kiki</title>
    <link rel="stylesheet" href="CSS_casitakiki.css">
</head>

<body>

<header>
    <div class="logo-container">
        <img src="img/logo_fondoblanco.png" class="mi-logo" alt="La Casita de Kiki">
    </div>
    <nav>
        <ul>
            <li><a href="#maquillaje">Maquillaje</a></li>
            <li><a href="#pasteles">Pasteles</a></li>
            <li><a href="#juguetes">Juguetes</a></li>
        </ul>
    </nav>
    <button id="btn-login-google"> Iniciar con Google</button>
</header>

<div id="cart-icon" onclick="toggleCart()">
    🛒 <span id="cart-count">0</span>
</div>

<aside id="shopping-cart" class="cart-hidden">
    <div class="cart-header">
        <h3>Tu Pedido ✨</h3>
        <button onclick="toggleCart()" class="close-btn">×</button>
    </div>

    <div id="cart-items">
        <p class="empty-msg">Tu carrito está vacío 🌸</p>
    </div>

    <div class="cart-footer">
        <div class="total-container">
            <h4>Total:</h4>
            <h4>$<span id="cart-total">0.00</span></h4>
        </div>

        <img src="img/imagen_pago.png" alt="Métodos de pago" style="width: 100%; margin-bottom: 10px;">

        <button class="btn-checkout" id="finalizar-compra" onclick="irAPagar()">
            Finalizar Compra 💳
        </button>

        <!-- SOLO UN contenedor PayPal -->
        <div id="paypal-button-container" style="display:none; margin-top:15px;"></div>
    </div>
    <div class="cart-footer">
    <div class="total-container">
        <h4>Total:</h4>
        <h4>$<span id="cart-total">0.00</span></h4>
    </div>

    <button class="btn-checkout" id="finalizar-compra" onclick="irAPagar()">
        Finalizar Compra 💳
    </button>

    <div id="paypal-button-container" style="display:none;"></div>
</div>
</aside>


<section id="hero-banner">
    <div class="banner-content">
        <h2>¡Bienvenidos a la casita de Kiki! ✨</h2>
        <p>Maquillaje que brilla, pasteles que enamoran y juguetes de novedad.</p>
        <a href="#productos" class="btn-explorar">Ver Novedades 🎀</a>
    </div>
</section>

<main id="productos">
    <div class="grid-productos"></div>
</main>

<footer>
    <p>© 2025 La Casita de Kiki 🌸</p>
</footer>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- PAYPAL SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=Ae2ycmRRzMtvtuQN2jfJ_l9Qf3Rji20g3tzh854KIdj1_0XexWv9zQnoPY7qVLWAHAX-Ki9uWKZdpVrK&currency=MXN"></script>

<!-- SCRIPT PRINCIPAL -->
<script src="script.js"></script>

<script>
function irAPagar() {
    if (typeof cart === "undefined" || cart.length === 0) {
        alert("Tu carrito esta vacio!");
        return;
    }

    const btn = document.getElementById("finalizar-compra");
    const paypalContainer = document.getElementById("paypal-button-container");

    btn.style.display = "none";
    paypalContainer.style.display = "block";
    paypalContainer.innerHTML = "";

    paypal.Buttons({

        createOrder: function(data, actions) {
            return actions.order.create({
                purchase_units: [{
                    amount: {
                        currency_code: "MXN",
                        value: total.toFixed(2)
                    }
                }]
            });
        },

        onApprove: function(data, actions) {
            return actions.order.capture().then(function() {
                alert("✅ Pago completado");
                cart = [];
                total = 0;
                actualizarVistaCarrito();
                paypalContainer.style.display = "none";
                btn.style.display = "block";
            });
        },

        onError: function(err){
            console.error(err);
            alert("Error con PayPal");
        }

    }).render("#paypal-button-container");
}
</script>


</body>
</html>
